<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mainbox box1">
        <img src="images/drizzle.png" alt="">
        <h1>Weather</h1>
        <h2>ForeCasts</h2>
        <button id="start" class="btn">Start</button>
    </div>
    <div class="mainbox box2 hide">
        <div class="searchBox">
            <input type="text" placeholder="Enter the City" id="cityInput">
            <span class="material-symbols-outlined">
                search
            </span>
        </div>
        <div class="img">
            <img src="images/clear.png" alt="Main" id="weathericon">
        </div>
        <div class="tempbox">
            <h1 id="temp">0°c</h1>
            <h3 id="city">Delhi</h3>
        </div>
        <div class="extradetails">
            <div class="windbox">
                <div class="icon">
                    <img src="images/wind.png" alt="wind">
                </div>
                <div class="winddetails details">
                    <p id="windspeed">0km/h</p>
                    <h3 class="text">Wind</h3>
                </div>
            </div>
            <div class="humiditybox">
                <div class="icon">
                    <img src="images/humidity.png" alt="humidity">
                </div>
                <div class="humiditydetails details">
                    <p id="humidity">0%</p>
                    <h3 class="text" >Humidity</h3>
                </div>
            </div>
        </div>
    </div>
    <div class="mainbox box3 hide">
        <h1 >404</h1>
        <h3 class="error">Oops! Page Not Found.</h2>
        <p class="errortext">The page you're looking for doesn't exist.</p>
        <button class="reset btn">Go Home</button>

    </div>
    <script src="script.js"></script>
</body>

</html>
